controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_base_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

    left_arm_position_controller:
      type: forward_command_controller/ForwardCommandController

    left_gripper_position_controller:
      type: forward_command_controller/ForwardCommandController

    right_arm_position_controller:
      type: forward_command_controller/ForwardCommandController

    right_gripper_position_controller:
      type: forward_command_controller/ForwardCommandController

    head_position_controller:
      type: forward_command_controller/ForwardCommandController

omni_base_controller:
  ros__parameters:
    wheel_names:
      - wheel_0_joint
      - wheel_1_joint
      - wheel_2_joint
    wheel_offset: 0.0
    robot_radius: 0.111
    wheel_radius: 0.0508
    odom_frame_id: odom
    base_frame_id: base_link
    position_feedback: true
    open_loop: false
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    publish_limited_velocity: true

left_arm_position_controller:
  ros__parameters:
    interface_name: position
    joints:
      - Rotation
      - Pitch
      - Elbow
      - Wrist_Pitch
      - Wrist_Roll

left_gripper_position_controller:
  ros__parameters:
    interface_name: position
    joints:
      - Jaw

right_arm_position_controller:
  ros__parameters:
    interface_name: position
    joints:
      - Rotation_2
      - Pitch_2
      - Elbow_2
      - Wrist_Pitch_2
      - Wrist_Roll_2

right_gripper_position_controller:
  ros__parameters:
    interface_name: position
    joints:
      - Jaw_2

head_position_controller:
  ros__parameters:
    interface_name: position
    joints:
      - head_pan_joint
      - head_tilt_joint
